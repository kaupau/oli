app = "strudelvibe"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  STATIC_DIR = "/app/static"
  DB_PATH = "/data/strudelvibe.db"
  UPLOAD_DIR = "/data/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "strudelvibe_data"
  destination = "/data"
